<!DOCTYPE html><html lang='vi'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Phan Văn Quyến</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,Arial}body{min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;background:
radial-gradient(circle at top,#8b5cf6 0%,transparent 35%),
radial-gradient(circle at bottom right,#60a5fa 0%,transparent 35%),
linear-gradient(160deg,#120a2a,#21104d,#1d4ed8);color:#fff}
.card{width:380px;max-width:94%;background:rgba(255,255,255,.09);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.18);border-radius:30px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,.4),inset 0 1px 1px rgba(255,255,255,.15)}
.avatar{width:120px;height:120px;border-radius:50%;overflow:hidden;margin:auto;border:3px solid rgba(255,255,255,.8);cursor:pointer}.avatar img{width:100%;height:100%;object-fit:cover}input{display:none}h1,p{text-align:center}.bio{opacity:.8;margin:8px 0 18px}
.item{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.1);padding:14px;border-radius:16px;text-decoration:none;color:#fff;margin-top:12px;transition:.2s}.item:hover{transform:scale(1.03)}
.icon{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#8b5cf6,#3b82f6);display:flex;align-items:center;justify-content:center}.dot{position:fixed;border-radius:50%;pointer-events:none}
</style></head><body>
<input id=av type=file accept=image/*><input id=bg type=file accept=image/*>
<div class=card>
<label for=av><div class=avatar><img id=img src='https://via.placeholder.com/300'></div></label>
<h1>Phan Văn Quyến</h1><p class=bio>Chạm avatar để đổi ảnh • Nhấn đúp nền để đổi nền</p>
<a class=item href='https://www.facebook.com/share/17onHyet2w/?mibextid=wwXIfr'><div class=icon><i class='fab fa-facebook-f'></i></div><div>Facebook</div></a>
<a class=item href='https://www.tiktok.com/@ovl.vq?_r=1&_t=ZS-97zVmbKnWvY'><div class=icon><i class='fab fa-tiktok'></i></div><div>TikTok</div></a>
<a class=item href='https://t.me/vanquyeniosvipp'><div class=icon><i class='fab fa-telegram-plane'></i></div><div>Telegram</div></a>
<a class=item href='https://discord.gg/yuFpmxMm'><div class=icon><i class='fab fa-discord'></i></div><div>Discord</div></a>
</div>
<script>
av.onchange=e=>img.src=URL.createObjectURL(e.target.files[0]);
document.body.ondblclick=()=>bg.click();
bg.onchange=e=>{let u=URL.createObjectURL(e.target.files[0]);document.body.style.background='url('+u+') center/cover fixed';}
const colors=['#ff4d6d','#ffb703','#80ffdb','#38bdf8','#a855f7','#fff'];
for(let i=0;i<35;i++){let d=document.createElement('div');d.className='dot';let s=Math.random()*2+1;d.style.width=d.style.height=s+'px';d.style.background=colors[Math.random()*colors.length|0];d.style.left=Math.random()*100+'vw';document.body.appendChild(d);let dur=9000+Math.random()*5000;(function loop(){d.animate([{transform:'translateY(-5vh)'},{transform:'translate('+(Math.random()*50-25)+'px,105vh)'}],{duration:dur});setTimeout(()=>{d.style.left=Math.random()*100+'vw';loop()},dur)})();}
</script></body></html>
